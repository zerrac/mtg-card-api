# fly.toml app configuration file generated for mtg-card-api on 2026-05-26T21:25:43Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mtg-card-api'
primary_region = 'cdg'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
  memory = '256mb'
  processes = ['app']
  size = 'shared-cpu-1x'
