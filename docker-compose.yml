version: '3.3'

services:
  db:
    image: postgres
    restart: "unless-stopped"
    environment:
      - POSTGRES_DB=djangodb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
  web:
    build:
      context: ./src
    restart: "unless-stopped"
    command: sh -c "python manage.py collectstatic --no-input &&
                    python manage.py makemigrations &&
                    python manage.py migrate &&
                  /usr/local/bin/gunicorn --reload mtgcards.wsgi:application --worker-class gevent -w 4 -b :8000"   --access-logfile - --error-logfile -
    env_file: .env
    volumes:
      - ./src/:/code
      - django_static:/static/
      - django_media:/django_media/
    depends_on:
      - db

  nginx: 
      build: 
        context: ./nginx
      restart: "unless-stopped"
#      ports: 
#        - 127.0.0.1:8000:80 
      volumes:  
        - django_static:/static/
        - django_media:/django_media/
      depends_on:
        - web
      networks:
        - default
        - public-network
      labels:
        - "traefik.enable=true"
        - "traefik.http.services.mtg-card-api.loadbalancer.server.port=80"
        - "traefik.http.routers.mtg-card-api.rule=Host(`mtg-card-api.ccarrez.webu.lan`)"
        # - "traefik.http.routers.mtg-card-api.middlewares=force-https"
        - "traefik.http.services.mtg-card-api.loadbalancer.server.scheme=http"
        - "traefik.docker.network=${TRAEFIK_BRIDGE:-webung_traefik}"


volumes:
  django_static:
  django_media:
networks:
  public-network:
    name: ${TRAEFIK_BRIDGE:-webung_traefik}
    external: true
