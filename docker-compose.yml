services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-djangodb}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - django_static:/static/
      - django_media:/django_media/
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(5); s.connect(('localhost', 8000)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    build:
      context: ./nginx
    restart: unless-stopped
    volumes:
      - django_static:/static/
      - django_media:/django_media/
    depends_on:
      web:
        condition: service_healthy
    networks:
      - default
      - public-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.mtg-card-api.loadbalancer.server.port=80"
      - "traefik.http.services.mtg-card-api.loadbalancer.server.scheme=http"
      - "traefik.http.routers.mtg-card-api.rule=Host(`${PUBLIC_HOSTNAME}`)"
      - "traefik.http.routers.mtg-card-api.entrypoints=websecure"
      - "traefik.http.routers.mtg-card-api.tls=true"
      - "traefik.http.routers.mtg-card-api.tls.certresolver=letsencrypt"
      - "traefik.docker.network=${TRAEFIK_BRIDGE:-webung_traefik}"

volumes:
  postgres_data:
  django_static:
  django_media:

networks:
  public-network:
    name: ${TRAEFIK_BRIDGE:-webung_traefik}
    external: true
